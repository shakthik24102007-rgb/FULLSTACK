<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 100px 100px 200px;
            grid-template-rows: 50px 200px 50px;
            gap: 10px;
        }
        .box{
            background-color: rgb(71, 199, 92);
            
        }
    </style>
</head>
<body>
    <div class="container">
<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>
<div class="box">5</div>
<div class="box">6</div>
<div class="box">7</div>
<div class="box">8</div>
    </div>
</body>
</html>
